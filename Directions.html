<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arroyo Vista IT — Color & Type Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Bitter:wght@500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useState } = React;

/* ---------- shared sub-components ---------- */
function Swatch({ hex, name, role, dark }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 0 }}>
      <div style={{ height: 46, borderRadius: 8, background: hex, border: '1px solid rgba(0,0,0,0.08)' }} />
      <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.2 }}>
        <span style={{ fontSize: 11, fontWeight: 600, color: dark ? '#e7edf3' : '#1d2733' }}>{name}</span>
        <span style={{ fontSize: 10, fontFamily: 'IBM Plex Mono, monospace', color: dark ? '#8fa3b5' : '#7c8794', textTransform: 'uppercase' }}>{hex}</span>
        {role && <span style={{ fontSize: 9.5, color: dark ? '#7d91a3' : '#9aa4b0' }}>{role}</span>}
      </div>
    </div>
  );
}

function Row({ children, cols = 5 }) {
  return <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap: 10 }}>{children}</div>;
}

function Section({ label, children, dark }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: dark ? '#7d91a3' : '#9aa4b0', fontFamily: 'IBM Plex Mono, monospace' }}>{label}</div>
      {children}
    </div>
  );
}

/* ---------- A · Vista Clinic ---------- */
function DirectionA() {
  const pad = 32;
  return (
    <div style={{ fontFamily: "'Public Sans', sans-serif", background: '#ffffff', color: '#16202b', height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: `${pad}px ${pad}px 22px`, borderBottom: '1px solid #e8edf2', background: 'linear-gradient(180deg,#f6f9fc,#ffffff)' }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#0868B8' }}>Direction A</div>
        <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: '-0.01em', marginTop: 6 }}>Vista Clinic</div>
        <div style={{ fontSize: 14, color: '#5b6875', marginTop: 4, lineHeight: 1.5 }}>Calm, civic, single-family system. One typeface does it all — clean, accessible, unmistakably healthcare.</div>
      </div>
      <div style={{ padding: pad, display: 'flex', flexDirection: 'column', gap: 26, flex: 1 }}>
        <Section label="Primary & deep">
          <Row cols={5}>
            <Swatch hex="#0868B8" name="Brand Blue" role="Primary" />
            <Swatch hex="#0B3B66" name="Navy" role="Headers" />
            <Swatch hex="#3E8FD0" name="Sky" role="Hover/lite" />
            <Swatch hex="#128C8C" name="Teal" role="Accent" />
            <Swatch hex="#E8F1FA" name="Wash" role="Surfaces" />
          </Row>
        </Section>
        <Section label="Neutrals & semantic">
          <Row cols={5}>
            <Swatch hex="#16202b" name="Ink" />
            <Swatch hex="#5b6875" name="Muted" />
            <Swatch hex="#1f9d57" name="Success" />
            <Swatch hex="#C9821A" name="Warning" />
            <Swatch hex="#C8392F" name="Danger" />
          </Row>
        </Section>
        <Section label="Typeface — Public Sans">
          <div>
            <div style={{ fontSize: 40, fontWeight: 800, letterSpacing: '-0.02em', lineHeight: 1.05 }}>Everyone is welcome</div>
            <div style={{ fontSize: 18, fontWeight: 600, color: '#0B3B66', marginTop: 8 }}>Submit a help desk ticket</div>
            <div style={{ fontSize: 14, color: '#42505d', marginTop: 8, lineHeight: 1.55, maxWidth: 420 }}>Body copy stays legible at small sizes — the U.S. design-system workhorse, tuned for forms, tables, and dense staff tools.</div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, color: '#0868B8', marginTop: 10 }}>TICKET-4821 · status: open</div>
          </div>
        </Section>
        <Section label="In use">
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
            <button style={{ background: '#0868B8', color: '#fff', border: 'none', borderRadius: 8, padding: '11px 18px', fontSize: 14, fontWeight: 600, fontFamily: 'inherit', boxShadow: '0 1px 2px rgba(11,59,102,0.25)' }}>New ticket</button>
            <button style={{ background: '#fff', color: '#0B3B66', border: '1.5px solid #cdd9e4', borderRadius: 8, padding: '10px 16px', fontSize: 14, fontWeight: 600, fontFamily: 'inherit' }}>Cancel</button>
            <span style={{ background: '#E8F1FA', color: '#0868B8', borderRadius: 999, padding: '5px 12px', fontSize: 12, fontWeight: 700 }}>In progress</span>
            <span style={{ background: '#e7f6ee', color: '#157a44', borderRadius: 999, padding: '5px 12px', fontSize: 12, fontWeight: 700 }}>Resolved</span>
          </div>
        </Section>
      </div>
    </div>
  );
}

/* ---------- B · Arroyo Warmth ---------- */
function DirectionB() {
  const pad = 32;
  return (
    <div style={{ fontFamily: "'Source Sans 3', sans-serif", background: '#FCFAF6', color: '#2b2722', height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: `${pad}px ${pad}px 22px`, borderBottom: '1px solid #ece3d6', background: 'linear-gradient(180deg,#f6efe4,#FCFAF6)' }}>
        <div style={{ fontFamily: "'Bitter', serif", fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#C2552E' }}>Direction B</div>
        <div style={{ fontFamily: "'Bitter', serif", fontSize: 30, fontWeight: 800, letterSpacing: '-0.01em', marginTop: 6 }}>Arroyo Warmth</div>
        <div style={{ fontSize: 14.5, color: '#6b6052', marginTop: 4, lineHeight: 1.5 }}>Human and community-rooted. Brand blue meets warm clay and sage — a slab-serif voice for headings keeps it friendly, not corporate.</div>
      </div>
      <div style={{ padding: pad, display: 'flex', flexDirection: 'column', gap: 26, flex: 1 }}>
        <Section label="Primary & warm accents">
          <Row cols={5}>
            <Swatch hex="#0868B8" name="Brand Blue" role="Primary" />
            <Swatch hex="#0E456F" name="Deep Blue" role="Headers" />
            <Swatch hex="#C2552E" name="Clay" role="Accent" />
            <Swatch hex="#6E8B6A" name="Sage" role="Support" />
            <Swatch hex="#EADFCB" name="Sand" role="Surfaces" />
          </Row>
        </Section>
        <Section label="Neutrals & semantic">
          <Row cols={5}>
            <Swatch hex="#2b2722" name="Warm Ink" />
            <Swatch hex="#6b6052" name="Muted" />
            <Swatch hex="#3F8F5C" name="Success" />
            <Swatch hex="#C2552E" name="Warning" />
            <Swatch hex="#B23A2E" name="Danger" />
          </Row>
        </Section>
        <Section label="Bitter (display) + Source Sans 3 (body)">
          <div>
            <div style={{ fontFamily: "'Bitter', serif", fontSize: 38, fontWeight: 800, letterSpacing: '-0.015em', lineHeight: 1.08 }}>Everyone is welcome</div>
            <div style={{ fontFamily: "'Bitter', serif", fontSize: 18, fontWeight: 700, color: '#0E456F', marginTop: 8 }}>Submit a help desk ticket</div>
            <div style={{ fontSize: 14.5, color: '#544c41', marginTop: 8, lineHeight: 1.55, maxWidth: 420 }}>The slab serif feels like the clinic — warm, steady, trustworthy. Source Sans 3 keeps body text crisp and quietly modern.</div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, color: '#C2552E', marginTop: 10 }}>TICKET-4821 · status: open</div>
          </div>
        </Section>
        <Section label="In use">
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
            <button style={{ background: '#0868B8', color: '#fff', border: 'none', borderRadius: 10, padding: '11px 18px', fontSize: 14.5, fontWeight: 700, fontFamily: 'inherit' }}>New ticket</button>
            <button style={{ background: 'transparent', color: '#C2552E', border: '1.5px solid #d8a98f', borderRadius: 10, padding: '10px 16px', fontSize: 14.5, fontWeight: 700, fontFamily: 'inherit' }}>Cancel</button>
            <span style={{ background: '#f0e6d3', color: '#9a6b1f', borderRadius: 999, padding: '5px 12px', fontSize: 12, fontWeight: 700 }}>In progress</span>
            <span style={{ background: '#e3efe1', color: '#3F8F5C', borderRadius: 999, padding: '5px 12px', fontSize: 12, fontWeight: 700 }}>Resolved</span>
          </div>
        </Section>
      </div>
    </div>
  );
}

/* ---------- C · Civic Modern ---------- */
function DirectionC() {
  const pad = 32;
  return (
    <div style={{ fontFamily: "'IBM Plex Sans', sans-serif", background: '#0d1b29', color: '#dde7f0', height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: `${pad}px ${pad}px 22px`, borderBottom: '1px solid #1c3046', background: 'linear-gradient(180deg,#102438,#0d1b29)' }}>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#4ea3e6' }}>Direction C</div>
        <div style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-0.01em', marginTop: 6, color: '#fff' }}>Civic Modern</div>
        <div style={{ fontSize: 14, color: '#8ba6bf', marginTop: 4, lineHeight: 1.5 }}>Efficient and app-like for power users. A precise grotesque + mono pairing, tuned for dense dashboards and dark control rooms.</div>
      </div>
      <div style={{ padding: pad, display: 'flex', flexDirection: 'column', gap: 26, flex: 1 }}>
        <Section label="Blue scale" dark>
          <Row cols={5}>
            <Swatch hex="#4ea3e6" name="Azure" role="Primary" dark />
            <Swatch hex="#0868B8" name="Brand Blue" role="Core" dark />
            <Swatch hex="#0d1b29" name="Control" role="Canvas" dark />
            <Swatch hex="#16293b" name="Panel" role="Surfaces" dark />
            <Swatch hex="#24E0C5" name="Signal" role="Accent" dark />
          </Row>
        </Section>
        <Section label="Neutrals & semantic" dark>
          <Row cols={5}>
            <Swatch hex="#dde7f0" name="Text" dark />
            <Swatch hex="#8ba6bf" name="Muted" dark />
            <Swatch hex="#2fcf7a" name="Success" dark />
            <Swatch hex="#f0b429" name="Warning" dark />
            <Swatch hex="#f4615a" name="Danger" dark />
          </Row>
        </Section>
        <Section label="IBM Plex Sans + IBM Plex Mono" dark>
          <div>
            <div style={{ fontSize: 38, fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1.06, color: '#fff' }}>Everyone is welcome</div>
            <div style={{ fontSize: 18, fontWeight: 600, color: '#4ea3e6', marginTop: 8 }}>Submit a help desk ticket</div>
            <div style={{ fontSize: 14, color: '#a8bdd1', marginTop: 8, lineHeight: 1.55, maxWidth: 420 }}>Engineered letterforms read crisply in tables and status feeds. The mono pairs natively for IDs, timestamps, and logs.</div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, color: '#24E0C5', marginTop: 10 }}>TICKET-4821 · status: open</div>
          </div>
        </Section>
        <Section label="In use" dark>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
            <button style={{ background: '#0868B8', color: '#fff', border: 'none', borderRadius: 7, padding: '11px 18px', fontSize: 14, fontWeight: 600, fontFamily: 'inherit' }}>New ticket</button>
            <button style={{ background: '#16293b', color: '#dde7f0', border: '1px solid #2a4258', borderRadius: 7, padding: '10px 16px', fontSize: 14, fontWeight: 600, fontFamily: 'inherit' }}>Cancel</button>
            <span style={{ background: 'rgba(78,163,230,0.16)', color: '#7cc0f0', borderRadius: 6, padding: '5px 11px', fontSize: 12, fontWeight: 600, fontFamily: "'IBM Plex Mono', monospace" }}>IN PROGRESS</span>
            <span style={{ background: 'rgba(47,207,122,0.16)', color: '#5fe0a0', borderRadius: 6, padding: '5px 11px', fontSize: 12, fontWeight: 600, fontFamily: "'IBM Plex Mono', monospace" }}>RESOLVED</span>
          </div>
        </Section>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dirs" title="Color & Type Directions" subtitle="Three personalities, all built on the real Arroyo Vista brand blue (#0868B8). Pick one — or mix — and I'll build the full system around it.">
        <DCArtboard id="a" label="A · Vista Clinic — calm civic, single family" width={560} height={880}><DirectionA /></DCArtboard>
        <DCArtboard id="b" label="B · Arroyo Warmth — human, slab-serif display" width={560} height={880}><DirectionB /></DCArtboard>
        <DCArtboard id="c" label="C · Civic Modern — efficient, dark, app-like" width={560} height={880}><DirectionC /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
