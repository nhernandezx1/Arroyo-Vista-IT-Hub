<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@font-face{font-family:'Orbitron';src:url('../fonts/Orbitron-VariableFont_wght.ttf') format('truetype');font-weight:400 900;font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0;}
body{width:700px;font-family:'Inter',sans-serif;background:#05080e;color:#dce7f1;
  background-image:radial-gradient(140% 100% at 50% 0%, #0a1320 0%, #05080e 60%);}
.card{padding:26px 28px;}
.disp{font-family:'Orbitron',sans-serif;} .mono{font-family:'Space Grotesk',monospace;}
.muted{color:#8093a6;} .faint{color:#5a6b7d;}
.lbl{font-family:'Space Grotesk',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5a6b7d;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.glass{background:rgba(16,24,36,0.62);backdrop-filter:blur(14px);border:1px solid rgba(120,170,220,0.14);border-radius:16px;}

</style></head><body><div class="card">
  <div class="lbl">Status pills & badges</div>
  <div class="row" style="margin-top:16px;">
    <span style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);">RESOLVED</span>
    <span style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;background:rgba(250,204,21,.12);color:#facc15;border:1px solid rgba(250,204,21,.3);">IN PROGRESS</span>
    <span style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;background:rgba(244,97,90,.12);color:#f4615a;border:1px solid rgba(244,97,90,.3);">ESCALATED</span>
  </div>
  <div class="row" style="margin-top:16px;">
    <span class="mono" style="display:inline-flex;align-items:center;gap:9px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:#facc15;border:1px solid rgba(250,204,21,0.35);background:rgba(250,204,21,0.06);padding:7px 14px;border-radius:999px;"><span style="width:7px;height:7px;border-radius:50%;background:#facc15;box-shadow:0 0 8px 1px rgba(250,204,21,.8);"></span> Arroyo Vista Personnel Only</span>
  </div>
  <div class="row" style="margin-top:16px;gap:18px;">
    <span style="font-size:12.5px;color:#6fd99a;"><i class="fa-solid fa-circle" style="font-size:7px;color:#22c55e;"></i> ONLINE</span>
    <span style="font-size:12.5px;color:#cdb86a;"><i class="fa-solid fa-circle" style="font-size:7px;color:#facc15;"></i> DEGRADED</span>
  </div>
</div></body></html>
