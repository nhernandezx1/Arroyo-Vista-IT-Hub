<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@font-face{font-family:'Orbitron';src:url('../fonts/Orbitron-VariableFont_wght.ttf') format('truetype');font-weight:400 900;font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0;}
body{width:700px;font-family:'Inter',sans-serif;background:#05080e;color:#dce7f1;
  background-image:radial-gradient(140% 100% at 50% 0%, #0a1320 0%, #05080e 60%);}
.card{padding:26px 28px;}
.disp{font-family:'Orbitron',sans-serif;} .mono{font-family:'Space Grotesk',monospace;}
.muted{color:#8093a6;} .faint{color:#5a6b7d;}
.lbl{font-family:'Space Grotesk',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5a6b7d;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.glass{background:rgba(16,24,36,0.62);backdrop-filter:blur(14px);border:1px solid rgba(120,170,220,0.14);border-radius:16px;}

</style></head><body><div class="card">
  <div class="lbl">Monitor motif</div>
  <div style="margin-top:16px;position:relative;height:150px;border:12px solid #0b0b0d;border-radius:20px;background:radial-gradient(140% 100% at 50% 0%, #0a1320, #05080e);box-shadow:inset 0 0 0 1px #1c1f24, inset 0 0 50px 10px rgba(0,0,0,.7);overflow:hidden;">
    <span style="position:absolute;top:-9px;right:14px;width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px 2px rgba(34,197,94,.85);"></span>
    <div style="padding:18px;">
      <div class="mono" style="color:#22c55e;font-size:12px;">AV IT TERMINAL v4.8.2</div>
      <div class="mono" style="color:#5b8f6e;font-size:11px;margin-top:4px;">Establishing encrypted session...</div>
      <div class="mono" style="color:#7dffb0;font-size:12px;margin-top:8px;">root@av-it-secure:~$ <span style="display:inline-block;width:8px;height:14px;background:#22c55e;vertical-align:-2px;"></span></div>
    </div>
  </div>
  <div class="faint" style="font-size:11px;margin-top:10px;">Thick rounded bezel · green power LED · CRT screen with terminal chrome.</div>
</div></body></html>
