<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@font-face{font-family:'Orbitron';src:url('../fonts/Orbitron-VariableFont_wght.ttf') format('truetype');font-weight:400 900;font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0;}
body{width:700px;font-family:'Inter',sans-serif;background:#05080e;color:#dce7f1;
  background-image:radial-gradient(140% 100% at 50% 0%, #0a1320 0%, #05080e 60%);}
.card{padding:26px 28px;}
.disp{font-family:'Orbitron',sans-serif;} .mono{font-family:'Space Grotesk',monospace;}
.muted{color:#8093a6;} .faint{color:#5a6b7d;}
.lbl{font-family:'Space Grotesk',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5a6b7d;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.glass{background:rgba(16,24,36,0.62);backdrop-filter:blur(14px);border:1px solid rgba(120,170,220,0.14);border-radius:16px;}

</style></head><body><div class="card">
  <div class="lbl">Accents & semantic</div>
  <div class="row" style="margin-top:14px;gap:10px;">
    <div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#22c55e;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Ops Green</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#22c55e</div>
  <div class="faint" style="font-size:10px;">default accent</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#facc15;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Amber</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#facc15</div>
  <div class="faint" style="font-size:10px;">highlight / classified</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#4ea3e6;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Azure</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#4ea3e6</div>
  <div class="faint" style="font-size:10px;">brand-lifted</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#f4615a;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Danger</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#f4615a</div>
  <div class="faint" style="font-size:10px;">errors</div></div>
  </div>
  <div class="row" style="margin-top:16px;gap:8px;">
    <span style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);">ACCENT THEMES</span>
    <span class="muted" style="font-size:12.5px;">swap via <span class="mono" style="color:#dce7f1;">data-theme="amber|azure"</span></span>
  </div>
</div></body></html>
