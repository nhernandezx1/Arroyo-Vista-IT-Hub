<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@font-face{font-family:'Orbitron';src:url('../fonts/Orbitron-VariableFont_wght.ttf') format('truetype');font-weight:400 900;font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0;}
body{width:700px;font-family:'Inter',sans-serif;background:#05080e;color:#dce7f1;
  background-image:radial-gradient(140% 100% at 50% 0%, #0a1320 0%, #05080e 60%);}
.card{padding:26px 28px;}
.disp{font-family:'Orbitron',sans-serif;} .mono{font-family:'Space Grotesk',monospace;}
.muted{color:#8093a6;} .faint{color:#5a6b7d;}
.lbl{font-family:'Space Grotesk',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5a6b7d;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.glass{background:rgba(16,24,36,0.62);backdrop-filter:blur(14px);border:1px solid rgba(120,170,220,0.14);border-radius:16px;}
.input{background:rgba(255,255,255,0.03);border:1px solid rgba(120,170,220,0.14);border-radius:9px;color:#dce7f1;font-family:inherit;font-size:13.5px;padding:9px 12px;width:100%;}
</style></head><body><div class="card">
  <div class="lbl">Form input & FAQ</div>
  <div style="margin-top:14px;">
    <div class="lbl" style="margin-bottom:5px;">Search the knowledge base</div>
    <input class="input" value="reset password" />
    <input class="input" style="margin-top:10px;border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.12);" value="focused field" />
  </div>
  <div style="border:1px solid rgba(34,197,94,0.4);border-radius:12px;margin-top:14px;background:rgba(255,255,255,0.015);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 18px;font-weight:600;font-size:14.5px;">How do I reset my password? <i class="fa-solid fa-chevron-up" style="color:#22c55e;"></i></div>
    <div class="muted" style="padding:0 18px 16px;font-size:13.5px;line-height:1.6;">Use the self-service portal link, or call the Help Desk at x9030.</div>
  </div>
</div></body></html>
