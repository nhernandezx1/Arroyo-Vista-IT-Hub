<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@font-face{font-family:'Orbitron';src:url('../fonts/Orbitron-VariableFont_wght.ttf') format('truetype');font-weight:400 900;font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0;}
body{width:700px;font-family:'Inter',sans-serif;background:#05080e;color:#dce7f1;
  background-image:radial-gradient(140% 100% at 50% 0%, #0a1320 0%, #05080e 60%);}
.card{padding:26px 28px;}
.disp{font-family:'Orbitron',sans-serif;} .mono{font-family:'Space Grotesk',monospace;}
.muted{color:#8093a6;} .faint{color:#5a6b7d;}
.lbl{font-family:'Space Grotesk',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5a6b7d;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.glass{background:rgba(16,24,36,0.62);backdrop-filter:blur(14px);border:1px solid rgba(120,170,220,0.14);border-radius:16px;}

</style></head><body><div class="card">
  <div class="lbl">Surfaces & text</div>
  <div class="row" style="margin-top:14px;gap:10px;">
    <div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#05080e;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Screen</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#05080e</div>
  <div class="faint" style="font-size:10px;">--bg</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#070c14;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Floor</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#070c14</div>
  <div class="faint" style="font-size:10px;">--bg-2</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#0c131e;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Panel</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#0c131e</div>
  <div class="faint" style="font-size:10px;">--panel-solid</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#0b0b0d;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Bezel</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#0b0b0d</div>
  <div class="faint" style="font-size:10px;">frame</div></div>
  </div>
  <div class="row" style="margin-top:14px;gap:10px;">
    <div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#dce7f1;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Text</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#dce7f1</div>
  <div class="faint" style="font-size:10px;">primary</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#8093a6;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Muted</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#8093a6</div>
  <div class="faint" style="font-size:10px;">secondary</div></div><div style="flex:1;min-width:120px;">
  <div style="height:54px;border-radius:10px;background:#5a6b7d;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Faint</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#5a6b7d</div>

  <div style="height:54px;border-radius:10px;background:#0868B8;border:1px solid rgba(120,170,220,0.16);"></div>
  <div style="font-size:12px;font-weight:600;margin-top:7px;color:#dce7f1;">Brand Blue</div>
  <div class="mono faint" style="font-size:10px;text-transform:uppercase;">#0868B8</div>
  <div class="faint" style="font-size:10px;">logo / azure</div></div>
  </div>
</div></body></html>
